<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GPT-2</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --border: #ccc;
    --bg: transparent;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e8e8e8; --muted: #9a9a9a; --border: #444; }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--fg);
  }
  .wrap { padding: 10px; }
  textarea, pre {
    width: 100%;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    font-size: 14px;
    line-height: 1.4;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    background: var(--bg);
    color: var(--fg);
  }
  textarea { resize: vertical; }
  pre {
    min-height: 4.5em;
    margin: 8px 0 0 0;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  label { font-size: 13px; color: var(--muted); }
  input[type="number"] {
    width: 3.5em;
    font: inherit;
    color: inherit;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 5px;
  }
  button {
    font: inherit;
    color: var(--fg);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  #status { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <textarea id="prompt" rows="3"></textarea>
  <div class="controls">
    <button id="run">Generate</button>
    <label>tokens <input id="tokens" type="number" min="5" max="100" value="40"></label>
    <span id="status"></span>
  </div>
  <pre id="output"></pre>
</div>

<script type="module">
  import { pipeline, TextStreamer } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3";

  // Swap to 'Xenova/distilgpt2' for a smaller/faster download if needed.
  const MODEL_ID = "Xenova/gpt2";

  const promptEl = document.getElementById("prompt");
  const tokensEl = document.getElementById("tokens");
  const runBtn = document.getElementById("run");
  const statusEl = document.getElementById("status");
  const outputEl = document.getElementById("output");

  let generator = null;

  async function ensureModel() {
    if (generator) return generator;
    statusEl.textContent = "loading model (~280MB, first time only)…";
    generator = await pipeline("text-generation", MODEL_ID, { dtype: "int8" });
    return generator;
  }

  async function run() {
    const prompt = promptEl.value;
    if (!prompt.trim()) return;

    runBtn.disabled = true;
    outputEl.textContent = "";

    try {
      const gen = await ensureModel();
      statusEl.textContent = "generating…";
      outputEl.textContent = prompt;

      const streamer = new TextStreamer(gen.tokenizer, {
        skip_prompt: true,
        callback_function: (text) => { outputEl.textContent += text; },
      });

      const maxNewTokens = Math.min(Math.max(Number(tokensEl.value) || 40, 5), 100);

      await gen(prompt, {
        max_new_tokens: maxNewTokens,
        do_sample: true,
        top_k: 50,
        temperature: 0.8,
        streamer,
      });

      statusEl.textContent = "";
    } catch (err) {
      statusEl.textContent = "error: " + err.message;
    } finally {
      runBtn.disabled = false;
    }
  }

  runBtn.addEventListener("click", run);
</script>
</body>
</html>
