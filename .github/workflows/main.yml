name: deploy-website

# Only run this when the main branch changes
on:
  workflow_dispatch:
  push:
    branches:
    - main
  schedule:
    - cron: '25 11 * * 1'
    - cron: '25 11 * * 6'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Install Nix
      uses: DeterminateSystems/determinate-nix-action@v3

    - name: Cache Nix binaries
      uses: DeterminateSystems/magic-nix-cache-action@v13
      with:
        use-flakehub: false

    - name: Load development environment from Nix flake
      uses: nicknovitski/nix-develop@v1
      with:
        arguments: "--accept-flake-config"

    - name: Render Quarto project profiles
      run: |
        for profile in student student,access instructor ta coordinator; do
          quarto render --profile "$profile"
        done

    - name: Publish Quarto project
      uses: quarto-dev/quarto-actions/publish@v2
      with:
        render: false
        target: gh-pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
